<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>瓜了个瓜 - 简单版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .game-container { width: 100%; max-width: 500px; padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .page-back-btn { position: fixed; left: 20px; top: 20px; background: linear-gradient(135deg, #607D8B, #455A64); color: white; border: none; padding: 10px 20px; border-radius: 25px; font-size: 16px; cursor: pointer; z-index: 100; }
        .page-back-btn:hover { transform: scale(1.05); }
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(255,255,255,0.1); border-radius: 15px; }
        .header .stat-item { margin: 0 auto; }
        .header .level-badge { margin: 0 auto; }
        .stat-item { color: #fff; font-size: 14px; text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: #ffd700; }
        .level-badge { background: linear-gradient(135deg, #ff9800, #ff5722); padding: 5px 15px; border-radius: 20px; color: white; font-weight: bold; }
        .card-area { width: 100%; height: 350px; position: relative; }
        .card { position: absolute; width: 65px; height: 85px; background: linear-gradient(145deg, #fff, #e8e8e8); border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 34px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); user-select: none; }
        .card.clickable { border: 3px solid #ffd700; animation: pulse 1.5s infinite; cursor: pointer; }
        .card.clickable:hover { transform: scale(1.05); }
        .card.covered { filter: brightness(0.6); cursor: not-allowed; }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,215,0,0.4); } 50% { box-shadow: 0 0 0 8px rgba(255,215,0,0); } }
        .slot-area { width: 100%; display: flex; justify-content: center; gap: 8px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 15px; }
        .slot { width: 50px; height: 65px; background: rgba(255,255,255,0.1); border: 2px dashed rgba(255,255,255,0.3); border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 28px; }
        .slot.filled { background: rgba(255,255,255,0.2); border-style: solid; }
        .slot.eliminating { animation: eliminateFlash 0.3s ease-out; }
        @keyframes eliminateFlash { 0% { transform: scale(1); background: rgba(255,255,255,0.8); } 50% { transform: scale(1.2); } 100% { transform: scale(0); opacity: 0; } }
        .tools { display: flex; gap: 20px; margin-top: 10px; }
        .tool-btn { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
        .tool-btn.shuffle { background: linear-gradient(145deg, #4CAF50, #2E7D32); color: white; }
        .tool-btn.undo { background: linear-gradient(145deg, #2196F3, #1565C0); color: white; }
        .tool-btn.reset { background: linear-gradient(145deg, #9E9E9E, #616161); color: white; }
        .tool-btn.back { background: linear-gradient(145deg, #607D8B, #455A64); color: white; }
        .tool-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .tool-btn:not(:disabled):hover { transform: scale(1.1); }
        .tool-label { font-size: 10px; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal.show { display: flex; }
        .modal-content { background: linear-gradient(145deg, #fff, #f0f0f0); padding: 40px; border-radius: 20px; text-align: center; }
        .modal-title { font-size: 36px; margin-bottom: 20px; }
        .modal-title.win { color: #4CAF50; }
        .modal-title.lose { color: #f44336; }
        .modal-buttons { display: flex; gap: 15px; justify-content: center; }
        .modal-btn { padding: 15px 30px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; background: linear-gradient(145deg, #ffd700, #ff9800); color: #333; font-weight: bold; }
        .modal-btn.secondary { background: linear-gradient(145deg, #9E9E9E, #616161); color: white; }
        .modal-btn.primary { background: linear-gradient(145deg, #4CAF50, #2E7D32); color: white; }
    </style>
</head>
<body>
    <div class="game-container">
        <button class="page-back-btn" onclick="showBackConfirm()">← 返回</button>
        <div class="header">
            <div class="stat-item"><div>剩余卡片</div><div class="stat-value" id="remainingCards">12</div></div>
            <div class="level-badge">第 <span id="levelNum">1</span> 关</div>
            <div class="stat-item"><div>槽位</div><div class="stat-value" id="slotCount">0/7</div></div>
        </div>
        <div class="card-area" id="cardArea"></div>
        <div class="slot-area" id="slotArea"></div>
        <div class="tools">
            <button class="tool-btn shuffle" onclick="shuffleCards()">🔀<span class="tool-label">洗牌</span></button>
            <button class="tool-btn undo" id="undoBtn" onclick="undo()" disabled>↩️<span class="tool-label">撤回</span></button>
            <button class="tool-btn reset" onclick="resetToLevel1()">🔄<span class="tool-label">重置</span></button>
        </div>
    </div>
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-buttons" id="modalButtons"></div>
        </div>
    </div>
    <div class="modal" id="backModal">
        <div class="modal-content">
            <div class="modal-title">返回后将重新开始游戏</div>
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeBackModal()">取消</button>
                <button class="modal-btn primary" onclick="goBackToMenu()">确认</button>
            </div>
        </div>
    </div>
    <script>
        const EMOJIS = ['🍉', '🌾', '🪵', '🔥', '💧', '⭐', '🍎'];
        const SLOT_COUNT = 7, CARD_WIDTH = 65, CARD_HEIGHT = 85, CARD_GAP = 4;
        const LEVELS = [
            { level:1, totalCards:12, typeCount:4, cardsPerType:3, layers:[{rows:3,cols:3},{rows:1,cols:3,offsetRow:1,offsetCol:0}], layerOffsetX:20, layerOffsetY:15, spreadWidth:0.3, spreadHeight:0.3 },
            { level:2, totalCards:21, typeCount:7, cardsPerType:3, layers:[{rows:3,cols:4},{rows:2,cols:3,offsetRow:0.5,offsetCol:0.5},{rows:1,cols:2,offsetRow:1,offsetCol:1}], layerOffsetX:18, layerOffsetY:12, spreadWidth:0.4, spreadHeight:0.4 },
            { level:3, totalCards:21, typeCount:7, cardsPerType:3, layers:[{rows:3,cols:4},{rows:2,cols:3,offsetRow:0.5,offsetCol:0.5},{rows:2,cols:2,offsetRow:1,offsetCol:1},{rows:1,cols:1,offsetRow:1.5,offsetCol:1.5}], layerOffsetX:14, layerOffsetY:10, spreadWidth:0.5, spreadHeight:0.5 },
            { level:4, totalCards:21, typeCount:7, cardsPerType:3, layers:[{rows:3,cols:4},{rows:3,cols:3,offsetRow:0,offsetCol:0.5},{rows:2,cols:2,offsetRow:0.5,offsetCol:1},{rows:2,cols:2,offsetRow:1,offsetCol:1},{rows:1,cols:1,offsetRow:1.5,offsetCol:1.5}], layerOffsetX:12, layerOffsetY:8, spreadWidth:0.6, spreadHeight:0.55 },
            { level:5, totalCards:21, typeCount:7, cardsPerType:3, layers:[{rows:3,cols:5},{rows:3,cols:4,offsetRow:0,offsetCol:0.5},{rows:2,cols:3,offsetRow:0.5,offsetCol:1},{rows:2,cols:2,offsetRow:1,offsetCol:1.5},{rows:1,cols:1,offsetRow:1.5,offsetCol:2},{rows:1,cols:1,offsetRow:2,offsetCol:2}], layerOffsetX:10, layerOffsetY:6, spreadWidth:0.7, spreadHeight:0.6 }
        ];
        let currentLevel = 1, cards = [], slots = [], history = [], gameOver = false;
        const cardArea = document.getElementById('cardArea'), slotArea = document.getElementById('slotArea'), remainingCardsEl = document.getElementById('remainingCards'), slotCountEl = document.getElementById('slotCount'), levelNumEl = document.getElementById('levelNum'), modal = document.getElementById('modal'), modalTitle = document.getElementById('modalTitle'), modalButtons = document.getElementById('modalButtons'), undoBtn = document.getElementById('undoBtn');
        function generateLayout(levelConfig) { const layout = []; let cardIndex = 0; for (let layerIdx = 0; layerIdx < levelConfig.layers.length; layerIdx++) { const layer = levelConfig.layers[layerIdx]; for (let row = 0; row < layer.rows; row++) { for (let col = 0; col < layer.cols; col++) { if (cardIndex >= levelConfig.totalCards) break; layout.push({ layer: layerIdx, row: row + (layer.offsetRow||0), col: col + (layer.offsetCol||0) }); cardIndex++; } } } return layout; }
        function initGame() { cards=[]; slots=[]; history=[]; gameOver=false; modal.classList.remove('show'); undoBtn.disabled=true; const levelConfig=LEVELS[currentLevel-1]; levelNumEl.textContent=currentLevel; let types=[]; for(let i=0;i<levelConfig.typeCount;i++)for(let j=0;j<levelConfig.cardsPerType;j++)types.push(i); while(types.length<levelConfig.totalCards)types.push(Math.floor(Math.random()*levelConfig.typeCount)); while(types.length>levelConfig.totalCards)types.pop(); shuffleArray(types); const layout=generateLayout(levelConfig); const areaWidth=cardArea.offsetWidth, areaHeight=cardArea.offsetHeight; const layoutWidth=Math.max(...layout.map(p=>p.col))+1, layoutHeight=Math.max(...layout.map(p=>p.row))+1; const cardTotalWidth=CARD_WIDTH+CARD_GAP, cardTotalHeight=CARD_HEIGHT+CARD_GAP; const usedWidth=layoutWidth*cardTotalWidth, usedHeight=layoutHeight*cardTotalHeight; const maxSpreadWidth=areaWidth-usedWidth, maxSpreadHeight=areaHeight-usedHeight-80; const spreadX=Math.max(0,maxSpreadWidth*levelConfig.spreadWidth/2), spreadY=Math.max(0,maxSpreadHeight*levelConfig.spreadHeight/2); const baseOffsetX=(areaWidth-usedWidth)/2-spreadX+cardTotalWidth/2, baseOffsetY=(areaHeight-usedHeight-80)/2-spreadY+cardTotalHeight/2; for(let i=0;i<layout.length;i++){ const pos=layout[i]; let baseX=baseOffsetX+pos.col*cardTotalWidth+levelConfig.layerOffsetX*pos.layer+(Math.random()-0.5)*8; let baseY=baseOffsetY+pos.row*cardTotalHeight+levelConfig.layerOffsetY*pos.layer+(Math.random()-0.5)*6; if(baseY+CARD_HEIGHT>areaHeight-90)baseY=areaHeight-90-CARD_HEIGHT; if(baseX<5)baseX=5; if(baseX+CARD_WIDTH>areaWidth-5)baseX=areaWidth-5-CARD_WIDTH; cards.push({id:i, type:types[i], layer:pos.layer, row:pos.row, col:pos.col, x:baseX, y:baseY}); } updateClickable(); renderCards(); renderSlots(); updateStats(); }
        function shuffleArray(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}
        function updateClickable(){for(let i=0;i<cards.length;i++)cards[i].clickable=true;for(let i=0;i<cards.length;i++){const card=cards[i];for(let j=0;j<cards.length;j++){if(i===j)continue;const other=cards[j];if(other.layer>card.layer&&isCompletelyCovered(card,other)){card.clickable=false;break;}}}}
        function isCompletelyCovered(card,other){const margin=8;return other.x<card.x+margin&&other.x+CARD_WIDTH>card.x+CARD_WIDTH-margin&&other.y<card.y+margin&&other.y+CARD_HEIGHT>card.y+CARD_HEIGHT-margin;}
        function renderCards(){cardArea.innerHTML='';const sortedCards=[...cards].sort((a,b)=>b.layer-a.layer||a.y-b.y||a.x-b.x);for(const card of sortedCards){const cardEl=document.createElement('div');cardEl.className='card'+(card.clickable?' clickable':' covered');cardEl.style.left=card.x+'px';cardEl.style.top=card.y+'px';cardEl.textContent=EMOJIS[card.type];if(card.clickable)cardEl.onclick=()=>clickCard(card.id);cardArea.appendChild(cardEl);}}
        function renderSlots(){slotArea.innerHTML='';for(let i=0;i<SLOT_COUNT;i++){const slotEl=document.createElement('div');slotEl.className='slot'+(slots[i]!==undefined?' filled':'');if(slots[i]!==undefined)slotEl.textContent=EMOJIS[slots[i]];slotArea.appendChild(slotEl);}}
        function updateStats(){remainingCardsEl.textContent=cards.length;slotCountEl.textContent=slots.length+'/7';}
        function clickCard(cardId){if(gameOver)return;const cardIndex=cards.findIndex(c=>c.id===cardId);if(cardIndex===-1)return;const card=cards[cardIndex];if(!card.clickable)return;saveHistory();slots.push(card.type);cards.splice(cardIndex,1);updateClickable();const hadElimination=checkAndEliminate();renderCards();if(!hadElimination)renderSlots();updateStats();updateUndoButton();if(cards.length===0){setTimeout(()=>showResult(true),300);return;}if(slots.length===SLOT_COUNT&&!hasMatchInSlots()){showResult(false);return;}const clickableCards=cards.filter(c=>c.clickable);if(clickableCards.length===0&&!canAllBeCleared()){showResult(false);}}
        function canAllBeCleared(){const counts={};for(const type of slots)counts[type]=(counts[type]||0)+1;for(const card of cards)counts[card.type]=(counts[card.type]||0)+1;for(const type in counts)if(counts[type]%3!==0)return false;return true;}
        function checkAndEliminate(){let hadElimination=false,changed=true;while(changed){changed=false;const counts={};for(const type of slots)counts[type]=(counts[type]||0)+1;for(const type in counts){if(counts[type]>=3){const indicesToRemove=[];for(let i=slots.length-1;i>=0&&indicesToRemove.length<Math.min(counts[type],3);i--){if(slots[i]===parseInt(type))indicesToRemove.push(i);}if(indicesToRemove.length>0){hadElimination=true;showEliminateAnimation(indicesToRemove);for(const idx of indicesToRemove)slots.splice(idx,1);changed=true;}break;}}}return hadElimination;}
        function showEliminateAnimation(indices){const slotEls=slotArea.querySelectorAll('.slot');slotArea.classList.add('eliminating');indices.forEach(idx=>{if(slotEls[idx])slotEls[idx].classList.add('eliminating');});setTimeout(()=>{slotArea.classList.remove('eliminating');indices.forEach(idx=>{if(slotEls[idx])slotEls[idx].classList.remove('eliminating');});renderSlots();},250);}
        function hasMatchInSlots(){const counts={};for(const type of slots){counts[type]=(counts[type]||0)+1;if(counts[type]>=3)return true;}return false;}
        function saveHistory(){history.push({cards:JSON.parse(JSON.stringify(cards)),slots:[...slots]});if(history.length>1)history.shift();}
        function undo(){if(history.length===0||gameOver)return;const prevState=history.pop();cards=prevState.cards;slots=prevState.slots;updateClickable();renderCards();renderSlots();updateStats();updateUndoButton();}
        function updateUndoButton(){undoBtn.disabled=history.length===0;}
        function shuffleCards(){if(gameOver||cards.length===0)return;saveHistory();const types=cards.map(c=>c.type);shuffleArray(types);for(let i=0;i<cards.length;i++)cards[i].type=types[i];renderCards();updateUndoButton();}
        function showResult(isWin){gameOver=true;if(isWin){if(currentLevel>=5){modalTitle.textContent='🎉 恭喜通关！';modalTitle.className='modal-title win';modalButtons.innerHTML='<button class="modal-btn" onclick="resetToLevel1()">再玩一次</button>';}else{modalTitle.textContent='恭喜通过第 '+currentLevel+' 关！';modalTitle.className='modal-title win';modalButtons.innerHTML='<button class="modal-btn secondary" onclick="restartGame()">重玩本关</button><button class="modal-btn primary" onclick="nextLevel()">下一关</button>';}}else{modalTitle.textContent='💀 失败！';modalTitle.className='modal-title lose';modalButtons.innerHTML='<button class="modal-btn" onclick="restartGame()">重玩本关</button>';}modal.classList.add('show');}
        function restartGame(){initGame();}
        function nextLevel(){if(currentLevel<5){currentLevel++;initGame();}}
        function resetToLevel1(){currentLevel=1;initGame();}
        function showBackConfirm(){document.getElementById('backModal').classList.add('show');}
        function closeBackModal(){document.getElementById('backModal').classList.remove('show');}
        function goBackToMenu(){window.location.href='index.html';}
        window.addEventListener('resize',()=>{if(!gameOver)initGame();});
        initGame();
    </script>
</body>
</html>
